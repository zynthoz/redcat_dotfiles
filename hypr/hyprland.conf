#source
source = ~/.config/hypr/modules/environment.conf
source = ~/.config/hypr/modules/monitor.conf
source = ~/.config/hypr/modules/apps.conf
source = ~/.config/hypr/modules/binds.conf
source = ~/.config/hypr/modules/input.conf

#startup
exec-once = hyprpaper
exec-once = waybar
exec-once = sleep 2 && hyprpm reload -n
exec-once = dunst
exec-once = hypridle

env = XDG_MENU_PREFIX,arch-
exec-once = kbuildsycoca6

exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = nm-applet --indicator
exec-once = sleep 0.5 && hyprctl dispatch workspace 1

exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

exec-once = sleep 2 && ghostty --class=window.Spotify-bg --window-padding-x=0 --window-padding-y=0 --window-decoration=false --background=1a0000  --background-opacity=0.4 -e zsh -c 'spotify_player'
exec-once = sleep 1.5 && ghostty --class=window.fastfetch-bg --title=fastfetch --scrollback-limit=0 --window-padding-x=20 --window-decoration=false --background-opacity=0 --window-padding-y=20 --font-size=10 -e zsh --no-rcs -c 'tput civis; clear; fastfetch; sleep 86400'

# exec-once = sleep 1.75 && ghostty --class=window.btop-bg --window-decoration=false --background-opacity=0 -e zsh -c 'btop'
# exec-once = sleep 2.25 && ghostty --class=window.cava-bg --window-padding-x=0 --window-padding-y=20,0 --window-decoration=false --background=2e3440  --background-opacity=0.3 -e zsh -c 'cava'

exec-once = [workspace 2 silent] $terminal --window-decoration=false
exec-once = [workspace 2 silent] $browser
exec-once = [workspace 3 silent] sleep 1 && $editor

# Set volume to 100% on startup
exec-once = wpctl set-volume @DEFAULT_AUDIO_SINK@ 1.0

# Laptop - only workspace 1
workspace = 1, monitor:eDP-1, persistent:true

# All other workspaces prefer external monitor
# When unplugged they fall back to eDP-1 automatically
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1

#windowrules
windowrule = stay_focused true, match:class ^(window.Rofi-bg)$

windowrule = decorate no, match:class ^(window.Spotify-bg)$
windowrule = float 1, match:class ^(window.Spotify-bg)$
windowrule = size 500 350, match:class ^(window.Spotify-bg)$
windowrule = move 1085 535, match:class ^(window.Spotify-bg)$
windowrule = border_size 0, match:class ^(window.Spotify-bg)$
windowrule = workspace 1 silent, match:class ^(window.Spotify-bg)$

windowrule = decorate no, match:class ^(window.btop-bg)$
windowrule = float 1, match:class ^(window.btop-bg)$
windowrule = size 805 610, match:class ^(window.btop-bg)$
windowrule = move 1095 445, match:class ^(window.btop-bg)$
windowrule = border_size 0, match:class ^(window.btop-bg)$
windowrule = workspace 1 silent, match:class ^(window.btop-bg)$

windowrule = decorate no, match:class ^(window.fastfetch-bg)$
windowrule = float 1, match:class ^(window.fastfetch-bg)$
windowrule = size 740 411, match:class ^(window.fastfetch-bg)$
windowrule = move 0 30, match:class ^(window.fastfetch-bg)$
windowrule = border_size 0, match:class ^(window.fastfetch-bg)$
windowrule = workspace 1 silent, match:class ^(window.fastfetch-bg)$
windowrule = no_blur on, match:class ^(window.fastfetch-bg)$

windowrule = float 1, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = size 402 492, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = move 1180 44, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = animation slide down, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = border_size 0, match:class ^(org.pulseaudio.pavucontrol)$

layerrule = no_anim on, match:namespace eww-audio

#layout
general {
    gaps_in = 6
    gaps_out = 21, 18, 18, 18
    border_size = 1
    col.active_border = 0xffcc0000
    col.inactive_border = 0xff4a0000

    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 20
    hover_icon_on_border = true
    allow_tearing = true
}


dwindle {
    force_split = 0
    preserve_split = true
}

#decoration & input
decoration {
    rounding = 4
    active_opacity = 1.0
    inactive_opacity = 0.96

    blur {
        enabled = true
        size = 10
        passes = 1
        new_optimizations = true
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = workspaces, 1, 20, myBezier, fade
    animation = windows, 1, 20, myBezier, slide
    animation = windowsIn, 1, 20, myBezier, slide
    animation = windowsOut, 1, 20, myBezier, slide
    animation = fade, 1, 20, myBezier
}

gestures {
    gesture = 3, horizontal, workspace, scale 0.5, 1.0, 1.5
    workspace_swipe_distance = 1000
# Reduce for fastest swipe
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 5
# Increase to makes quick flicks more responsive
}

plugin {
    gloview {
        layout = rows
        gap = 34
        blur = 1
        anchor = top
        duration = 200
        backdrop_color = rgba(8b000022)
        strip_card_round = 0
        preview_round = 0
        strip_band_color = rgba(0d0000ff)
        strip_active_border = rgba(8b000022)
        strip_hover_border = rgba(cc000022)
        select_border = rgba(8b000022)
        hover_border = rgba(cc000022)


    } 
}

debug {
    disable_logs = false
}
