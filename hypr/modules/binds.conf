$mainMod = SUPER

bind = $mainMod, D, exec, $editor
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,

bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, G, fullscreen, 0
bind = $mainMod, V, layoutmsg, togglesplit
bind = $mainMod, N, movetoworkspace, empty

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

bindm = $mainMod, mouse:272, movewindow

#gloview (overview plugin)
bind = ALT, TAB, gloview:toggle
bind = CTRL, TAB, gloview:allworkspaces

bind = $mainMod, TAB, exec, rofi -show drun -show-icons --class=window.Rofi-bg
bindn = ,mouse:272,exec,/home/aaronlime/.config/hypr/scripts/rofi-click-to-close.sh

#screenshot
bind = , Print, exec, grim -g "$(slurp)" - | tee ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy --type image/png

#media keys
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = , XF86MonBrightnessUp, exec, brightnessctl set 10%+

bindl = , XF86PowerOff, exec, hyprshutdown --vt 1 --post-cmd "systemctl poweroff"

# bind = $mainMod SHIFT, R, exec, hyprctl reload
# bind = $mainMod SHIFT, M, exec, hyprshutdown --vt 1 --post-cmd "systemctl poweroff"
# bind = $mainMod SHIFT, X, exec, hyprshutdown --vt 1 --post-cmd "systemctl reboot"

